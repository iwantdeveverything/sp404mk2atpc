<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SP-404MK2 DAW</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <div class="device-shell">
        <header class="device-header">
          <div class="logo">SP-404MK2 <span>DAW</span></div>
          <div class="lcd-screen">
            <div class="lcd-text" id="status-display">WAITING FOR AUDIO</div>

            <!-- Effect UI -->
            <div class="effect-ui">
              <div class="effect-selector-container">
                <button id="effect-selector-btn" class="glass-btn">FX: None</button>
                <!-- Effect options are rendered dynamically from list_effects() -->
                <div id="effect-selector-grid" class="effect-grid hidden"></div>
              </div>

              <!-- Parameter knobs are rendered dynamically per effect metadata -->
              <div class="knobs-container" id="knobs-container"></div>

              <!-- Dedicated wet/dry mix control: always present for an active effect -->
              <div class="mix-control hidden" id="mix-control">
                <div class="knob-wrapper">
                  <div class="knob mix-knob" id="mix-knob" tabindex="0">
                    <div class="knob-indicator"></div>
                  </div>
                  <span class="knob-label">MIX</span>
                </div>
              </div>
            </div>

            <div class="controls" style="flex-wrap: wrap; gap: 8px;">
              <div class="bpm-ui">
                <button id="tap-btn" class="glass-btn tap-btn">TAP</button>
                <div class="bpm-value">
                  <input type="number" id="bpm-input" value="120" min="40" max="300" step="0.1"/>
                  <span class="bpm-label">BPM</span>
                </div>
              </div>
              <button id="resample-btn" class="routing-btn">RESAMPLE</button>
              <button id="bus1-btn" class="routing-btn">BUS 1</button>
              <button id="bus2-btn" class="routing-btn">BUS 2</button>
              <button id="audio-upload-btn" class="upload-btn">
                LOAD SAMPLE
              </button>
              <button id="browser-toggle-btn" class="upload-btn">BROWSER</button>
              <div class="selected-pad-display">TARGET PAD: <span id="target-pad">0</span></div>
            </div>
          </div>
        </header>
        
        <main class="pad-section">
          <div class="pad-grid">
            <!-- 16 Pads -->
            <button class="pad" data-pad="0"><span class="pad-label">1</span></button>
            <button class="pad" data-pad="1"><span class="pad-label">2</span></button>
            <button class="pad" data-pad="2"><span class="pad-label">3</span></button>
            <button class="pad" data-pad="3"><span class="pad-label">4</span></button>
            <button class="pad" data-pad="4"><span class="pad-label">5</span></button>
            <button class="pad" data-pad="5"><span class="pad-label">6</span></button>
            <button class="pad" data-pad="6"><span class="pad-label">7</span></button>
            <button class="pad" data-pad="7"><span class="pad-label">8</span></button>
            <button class="pad" data-pad="8"><span class="pad-label">9</span></button>
            <button class="pad" data-pad="9"><span class="pad-label">10</span></button>
            <button class="pad" data-pad="10"><span class="pad-label">11</span></button>
            <button class="pad" data-pad="11"><span class="pad-label">12</span></button>
            <button class="pad" data-pad="12"><span class="pad-label">13</span></button>
            <button class="pad" data-pad="13"><span class="pad-label">14</span></button>
            <button class="pad" data-pad="14"><span class="pad-label">15</span></button>
            <button class="pad" data-pad="15"><span class="pad-label">16</span></button>
          </div>
        </main>

        <!-- File Browser Panel -->
        <div id="file-browser" class="file-browser hidden">
          <div class="browser-header">
            <h3>Library</h3>
            <button id="browser-close-btn" class="glass-btn small">✕</button>
          </div>
          <div class="browser-controls">
            <button id="browser-open-dir" class="glass-btn small">Open Folder</button>
            <button id="browser-up-dir" class="glass-btn small">↑ Up</button>
          </div>
          <div class="browser-path" id="browser-current-path">No folder selected</div>
          <ul id="browser-file-list" class="file-list"></ul>
          
          <div class="waveform-container">
            <canvas id="waveform-canvas"></canvas>
            <div class="waveform-overlay"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
