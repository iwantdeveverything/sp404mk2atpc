# OpenSpec bootstrap config — generated by sdd-init
project: sp404mk2atpc

context: |
  Tauri 2 desktop app emulating an SP-404MK2 sampler/DAW.
  Frontend: vanilla TypeScript + Vite (no framework). Entry src/main.ts, src/styles.css, index.html.
  Backend: Rust in src-tauri/src (audio engine, effects, fs/project I/O) using cpal, hound, fundsp, rtrb.
  Realtime audio: lock-free (rtrb) + assert_no_alloc on the audio thread.
  Artifact store: openspec (this dir) + engram mirror for cross-session recovery.

strict_tdd: false
strict_tdd_reason: >
  Split stack. Rust backend IS strict-TDD capable (cargo test with existing
  inline #[cfg(test)] tests). Frontend has NO test runner configured, so
  project-wide strict TDD is not enforceable. Backend changes SHOULD follow
  strict TDD; frontend changes use Standard Mode until a runner (e.g. vitest)
  is added.

testing:
  backend:
    language: rust
    test_command: "cargo test"          # run from src-tauri/
    check_command: "cargo check"
    linter: "cargo clippy"
    formatter: "cargo fmt"
    layers:
      unit: true
      integration: false
      e2e: false
    existing_tests: "8 inline tests in fs/audio.rs, audio/engine.rs, audio/effects/mod.rs"
  frontend:
    language: typescript
    test_command: null                  # NONE configured
    type_check: "tsc --noEmit"          # via `npm run build`
    build_command: "npm run build"
    dev_command: "npm run dev"
    linter: null
    formatter: null
    layers:
      unit: false
      integration: false
      e2e: false

phases:
  proposal: required for substantial changes
  spec: capability specs under openspec/specs
  design: required for architecture/audio-thread changes
  tasks: dependency-ordered, respect 400-line PR budget
  apply: backend changes follow strict TDD; frontend standard mode
  verify: validate against spec; run cargo test for backend
  archive: move change dir under openspec/changes/archive
